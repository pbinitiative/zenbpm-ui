name: publish docker image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version with v prefix, for example v2.0.0.
        required: true
        type: string
      checkout_ref:
        description: Ref to build. Defaults to release/<version>.
        required: false
        type: string

permissions:
  actions: read
  contents: write
  packages: write
  security-events: write

jobs:
  release:
    uses: ./.github/workflows/release-reusable.yaml
    with:
      release-tag: ${{ inputs.version || github.ref_name }}
      checkout-ref: ${{ inputs.checkout_ref || github.ref }}
      artifact-prefix: trivy-release-reports
      publish: true
      security-scan: true
      notify: true
    secrets: inherit

  github-release:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.version || github.ref_name }}
        run: gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
